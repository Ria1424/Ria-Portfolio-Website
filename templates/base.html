<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ria Sachin Chawak's Professional Portfolio. Data Analyst Intern & Final Year Computer Science & Business Systems Student.">
    <meta name="author" content="Ria Sachin Chawak">
    <title>Ria Sachin Chawak | Portfolio</title>
    
    <!-- Google Fonts: Playfair Display (Serif Headings), Lora (Serif Body), Montserrat (Sans-Serif UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Top Decorative Border -->
    <div class="top-decorative-line"></div>

    <!-- Navigation Header -->
    <header class="header">
        <div class="header-container">
            <a href="{{ url_for('home') }}" class="logo-container">
                <span class="logo-monogram">RSC</span>
                <span class="logo-divider">|</span>
                <span class="logo-title">Ria Sachin Chawak</span>
            </a>
            
            <!-- Mobile Menu Toggle Button -->
            <button class="nav-toggle" aria-label="toggle navigation" id="navToggle">
                <span class="hamburger"></span>
            </button>

            <!-- Navigation Links -->
            <nav class="nav" id="navMenu">
                <ul class="nav-list">
                    <li class="nav-item">
                        <a href="{{ url_for('home') }}" class="nav-link {% if active_page == 'home' %}active{% endif %}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a href="{{ url_for('about') }}" class="nav-link {% if active_page == 'about' %}active{% endif %}">About</a>
                    </li>
                    <li class="nav-item">
                        <a href="{{ url_for('experience') }}" class="nav-link {% if active_page == 'experience' %}active{% endif %}">Experience</a>
                    </li>
                    <li class="nav-item">
                        <a href="{{ url_for('projects') }}" class="nav-link {% if active_page == 'projects' %}active{% endif %}">Projects</a>
                    </li>
                    <li class="nav-item">
                        <a href="{{ url_for('skills') }}" class="nav-link {% if active_page == 'skills' %}active{% endif %}">Skills</a>
                    </li>
                    <li class="nav-item">
                        <a href="{{ url_for('publications') }}" class="nav-link {% if active_page == 'publications' %}active{% endif %}">Publications</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Main Content Wrapper -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-decor-crest">
                <i class="fa-solid fa-feather-pointed"></i>
            </div>
            
            <div class="footer-socials">
                <a href="https://github.com/Ria1424" target="_blank" rel="noopener noreferrer" title="GitHub" class="social-icon-link">
                    <i class="fa-brands fa-github"></i>
                </a>
                <a href="https://www.linkedin.com/in/riachawak/" target="_blank" rel="noopener noreferrer" title="LinkedIn" class="social-icon-link">
                    <i class="fa-brands fa-linkedin-in"></i>
                </a>
                <a href="https://www.codechef.com/users/coderriasc" target="_blank" rel="noopener noreferrer" title="CodeChef" class="social-icon-link" style="display: flex; align-items: center; justify-content: center;">
                    <svg viewBox="0 0 512 512" fill="currentColor" style="width: 1.1rem; height: 1.1rem;">
                        <path d="M410 230c0-66-54-120-120-120-30 0-57 11-78 29-21-18-48-29-78-29-66 0-120 54-120 120 0 24 7 46 19 65-17 19-27 45-27 73 0 54 40 99 93 107v18c0 10 8 18 18 18h186c10 0 18-8 18-18v-18c53-8 93-53 93-107 0-28-10-54-27-73 12-19 19-41 19-65zm-222 90h136v40H188v-40z"/>
                    </svg>
                </a>
            </div>

            <div class="footer-copyright">
                <div class="footer-sub-tagline" style="font-size: 0.65rem; margin-bottom: 0.4rem; opacity: 0.75; font-family: var(--font-ui); text-transform: uppercase; letter-spacing: 1px;">Technology &amp; Aesthetics built by Ria Chawak</div>
                &copy; 2026
            </div>
        </div>
    </footer>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
